
services:
  scant_api:
    build: .
    container_name: scant_api
    restart: unless-stopped
    network_mode: host
    volumes:
      # Mapujemy zewnątrz (folder na hoście RPi) do wewnątrz kontenera (folder docelowy API)
      # Dzięki temu zrobione skany nie znikną po usunięciu kontenera
      - ./scans:/app/scans
    devices:
      # Mapowanie urządzeń sprzętowych Raspberry Pi do kontenera
      - "/dev/vchiq:/dev/vchiq"       # RPi: interfejs kamery (libcamera)
      - "/dev/video0:/dev/video0"     # RPi: V4L2 video device (RPI-HQ-CAMERA)
      # /dev/dma_heap jest wymagane przez picamera2/libcamera na kernelach 6.1+.
      # Jeśli na Twoim RPi to urządzenie nie istnieje (starsze jądro), zakomentuj poniższą linię.
      - "/dev/dma_heap:/dev/dma_heap" # RPi: DMA heap dla buforów graficznych (kernel 6.1+)
    privileged: true
    environment:
      # Logi Pythonowe wyrzucane od razu na standardowe wyjście (Console-First Logging)
      - PYTHONUNBUFFERED=1
